

#! DONT FORGET TO CHANGE greetd/devices.conf IF NEEDED!!!!!!!!!!


#############
### INPUT ###
#############

# https://wiki.hyprland.org/Configuring/Variables/#input
input {
    kb_layout = se
    kb_variant =
    kb_model =
    kb_options = caps:super
    kb_rules =

    follow_mouse = 2
    float_switch_override_focus = 0
    
    touchpad {
        natural_scroll = true
        clickfinger_behavior = true
    }
}

device{
    name = glorious-model-o
    #sensitivity = -0.958333333333333333333 # -1.0 - 1.0, 0 means no modification.
    sensitivity = -0.5
    accel_profile = flat
}

# https://wiki.hyprland.org/Configuring/Variables/#gestures
gestures {
    workspace_swipe_forever = true
}

# Example per-device config
# See https://wiki.hyprland.org/Configuring/Keywords/#per-device-input-configs for more
device {
    name = epic-mouse-v1
    sensitivity = -0.5
}

cursor {
    hide_on_key_press = true
}

################
### MONITORS ###
################

# Stationary Monitor
monitor = desc:Acer Technologies XB271HU A, 2560x1440@165, 0x0, 1, cm, auto

# Laptop Monitor
monitor = eDP-1, 1920x1200, auto, 1

# Misc. monitors
monitor = , preferred, auto, 1
