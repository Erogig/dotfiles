
source = ./vars.conf

###################
### KEYBINDINGS ###
###################

#temp
bind = $mainMod, Z, exec, pkill -SIGUSR1 waybar

# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more
bind = $mainMod, Return, exec, $terminal
bind = $mainMod, Q, killactive,
#bind = $mainMod, M, exit,
#bind = $mainMod, E, exec, $fileManager
bind = $mainMod, C, togglefloating,
bind = $mainMod, R, exec, ./reloadAll.sh
bind = $mainMod, Escape, exec, hyprlock
#bindr = $mainMod, Super_L, exec, pkill $menu || $createChildren -p "$menu" -d "waybar" -c "waybar -c /home/erogig/.config/waybar/clock.jsonc -s /home/erogig/.config/waybar/clock.css"
bindr = $mainMod, Super_L, exec, pkill rofi || $hyprDir/menu.sh

# Alt Tab
bind = ALT, TAB, focuscurrentorlast

# Hypershot
bind = $mainMod CONTROL, S, exec, hyprshot -m output --clipboard-only
bind = $mainMod CONTROL SHIFT, S, exec, hyprshot -m region --freeze --clipboard-only

# Fullscreen
bind = $mainMod, F, fullscreen
bind = $mainMod SHIFT, F, fullscreen, 1

# Move focus
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d

# Move Window
bind = $mainMod SHIFT, H, movewindow, l
bind = $mainMod SHIFT, L, movewindow, r
bind = $mainMod SHIFT, K, movewindow, u
bind = $mainMod SHIFT, J, movewindow, d

# Move workspace

bind = $mainMod CONTROL, H, movecurrentworkspacetomonitor, l
bind = $mainMod CONTROL, L, movecurrentworkspacetomonitor, r
bind = $mainMod CONTROL, K, movecurrentworkspacetomonitor, u
bind = $mainMod CONTROL, J, movecurrentworkspacetomonitor, d

# Switch workspaces
bind = $mainMod, d, workspace, discord
bind = $mainMod, w, workspace, browser
bind = $mainMod, m, workspace, music
bind = $mainMod, t, workspace, top
bind = $mainMod, s, workspace, steam
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace
bind = $mainMod SHIFT, d, movetoworkspace, discord
bind = $mainMod SHIFT, w, movetoworkspace, browser
bind = $mainMod SHIFT, m, movetoworkspace, music
bind = $mainMod SHIFT, t, movetoworkspace, top
bind = $mainMod SHIFT, s, movetoworkspace, steam
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Example special workspace (scratchpad)
#bind = $mainMod, S, togglespecialworkspace, magic
#bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, right, workspace, e+1
bind = $mainMod, left, workspace, e-1

#bind = $mainMod, mouse_down, workspace, e+1
#bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

bindel = ,XF86MonBrightnessUp, exec, brightnessctl s 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl s 5%-

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous
